name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hiair
          POSTGRES_USER: hiair
          POSTGRES_PASSWORD: hiair
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hiair -d hiair"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://hiair:hiair@localhost:5432/hiair
      JWT_SECRET: ci-test-jwt-secret-32-bytes-min-abcdef
      NOTIFICATION_ADMIN_TOKEN: ci-admin-token-123456
      SUBSCRIPTION_PROVIDER: stub
      SUBSCRIPTION_WEBHOOK_SECRET: ci-webhook-secret-123456
      RETENTION_NOTIFICATION_DELIVERY_ATTEMPTS_DAYS: "90"
      RETENTION_NOTIFICATION_EVENTS_DAYS: "180"
      RETENTION_SUBSCRIPTION_WEBHOOK_EVENTS_DAYS: "180"
      RETENTION_SECRET_ROTATION_EVENTS_DAYS: "365"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        working-directory: backend
        run: |
          python -m compileall app scripts

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests -q

      - name: Security and retention prechecks
        working-directory: backend
        run: |
          python scripts/check_env_security.py --strict
          python scripts/retention_cleanup.py --dry-run

      - name: Initialize schema and run validations
        working-directory: backend
        run: |
          python scripts/init_db.py
          python scripts/smoke_db_flow.py
          python scripts/validate_risk_historical.py
