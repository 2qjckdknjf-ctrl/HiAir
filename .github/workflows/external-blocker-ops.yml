name: External Blocker Ops

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  blocker-ops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run blocker ops pipeline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 backend/scripts/run_external_blocker_ops.py --notify

      - name: Run closure readiness gate
        id: closure_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          python3 backend/scripts/check_external_blocker_closure_readiness.py --json-output closure_gate.json | tee closure_gate.log
          gate_exit=${PIPESTATUS[0]}
          echo "exit_code=${gate_exit}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run evidence completeness gate
        id: evidence_gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          python3 backend/scripts/check_external_blocker_evidence_completeness.py --json-output evidence_gate.json | tee evidence_gate.log
          gate_exit=${PIPESTATUS[0]}
          echo "exit_code=${gate_exit}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run store metadata packet gate
        id: metadata_gate
        run: |
          set +e
          set -o pipefail
          python3 backend/scripts/check_store_metadata_packet.py --json-output metadata_gate.json | tee metadata_gate.log
          gate_exit=${PIPESTATUS[0]}
          echo "exit_code=${gate_exit}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post daily status to coordination issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOSURE_STATUS="PASS"
          EVIDENCE_STATUS="PASS"
          METADATA_STATUS="PASS"
          if [ "${{ steps.closure_gate.outputs.exit_code }}" != "0" ]; then
            CLOSURE_STATUS="FAIL"
          fi
          if [ "${{ steps.evidence_gate.outputs.exit_code }}" != "0" ]; then
            EVIDENCE_STATUS="FAIL"
          fi
          if [ "${{ steps.metadata_gate.outputs.exit_code }}" != "0" ]; then
            METADATA_STATUS="FAIL"
          fi
          DETAILS="$(python3 - <<'PY'
          import json
          from pathlib import Path

          closure = json.loads(Path("closure_gate.json").read_text(encoding="utf-8"))
          evidence = json.loads(Path("evidence_gate.json").read_text(encoding="utf-8"))
          metadata = json.loads(Path("metadata_gate.json").read_text(encoding="utf-8"))

          lines = ["Detailed gate snapshot:"]
          lines.append("- closure-readiness rows:")
          for row in closure.get("rows", []):
            lines.append(
              f"  - #{row['issue_number']}: {row['readiness']} ({row['checkboxes_done']}/{row['checkboxes_total']})"
            )
          lines.append("- evidence-completeness rows:")
          for row in evidence.get("rows", []):
            lines.append(f"  - #{row['issue_number']} {row['ext_id']}: {row['status']}")
          lines.append("- store-metadata-packet rows:")
          for row in metadata.get("rows", []):
            lines.append(f"  - L{row['line']} {row['type']}: {row['text']}")
          if not metadata.get("rows"):
            lines.append("  - no unresolved packet items")
          print("\n".join(lines))
          PY
          )"
          gh issue comment 7 --repo 2qjckdknjf-ctrl/HiAir --body "$(cat <<EOF
          Automated External Blocker Ops run completed.

          - closure-readiness gate: ${CLOSURE_STATUS}
          - evidence-completeness gate: ${EVIDENCE_STATUS}
          - store-metadata-packet gate: ${METADATA_STATUS}

          ${DETAILS}

          Artifacts refreshed:
          - docs/_operator/daily-external-blocker-update-YYYY-MM-DD.md
          - docs/_operator/external-blocker-dashboard.md
          EOF
          )"

      - name: Fail job when strict gates fail
        if: ${{ steps.closure_gate.outputs.exit_code != '0' || steps.evidence_gate.outputs.exit_code != '0' || steps.metadata_gate.outputs.exit_code != '0' }}
        run: |
          echo "One or more blocker gates failed."
          exit 1
