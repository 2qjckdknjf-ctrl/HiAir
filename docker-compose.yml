services:
  postgres:
    image: postgres:16
    container_name: hiair-postgres
    environment:
      POSTGRES_DB: hiair
      POSTGRES_USER: hiair
      POSTGRES_PASSWORD: hiair
    ports:
      - "5432:5432"
    volumes:
      - hiair_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiair -d hiair"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hiair_postgres_data:
